<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>SAFU — Controlled Collapse</title>

<style>
:root{
  --bg:#05060a;
  --text:#eafff4;
  --accent:#00ff99;
  --muted:rgba(255,255,255,0.65);
}

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family: monospace;
}

body{
  background: radial-gradient(circle at center, #0c0f18, var(--bg));
  color:var(--text);
  overflow:hidden;
  transition:0.6s ease;
}

/* subtle instability field */
body::before{
  content:"";
  position:fixed;
  inset:0;
  background:
    radial-gradient(circle at 50% 50%, rgba(0,255,153,0.08), transparent 60%),
    repeating-linear-gradient(
      0deg,
      rgba(255,255,255,0.03),
      rgba(255,255,255,0.03) 1px,
      transparent 1px,
      transparent 3px
    );
  opacity:0.08;
  pointer-events:none;
}

/* CENTER */
.wrap{
  height:100vh;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  text-align:center;
  padding:20px;
}

/* MAIN TITLE */
h1{
  font-size:92px;
  letter-spacing:10px;
  color:var(--accent);
  text-shadow:0 0 30px rgba(0,255,153,0.25);
  animation:flicker 2.6s infinite;
}

@keyframes flicker{
  0%,100%{opacity:1;}
  50%{opacity:0.72;}
}

/* SUB */
.sub{
  margin-top:10px;
  font-size:14px;
  color:var(--muted);
}

.desc{
  margin-top:10px;
  max-width:520px;
  font-size:13px;
  color:var(--muted);
  line-height:1.5;
}

/* BUTTON */
button{
  margin-top:25px;
  padding:12px 18px;
  border:1px solid var(--accent);
  background:transparent;
  color:var(--accent);
  cursor:pointer;
  transition:0.25s;
}

button:hover{
  background:var(--accent);
  color:#000;
}

/* INFO BAR */
.info{
  position:absolute;
  bottom:25px;
  width:100%;
  display:flex;
  justify-content:center;
  gap:60px;
  font-size:12px;
  color:var(--muted);
}

.info div{
  text-align:center;
}

/* STATE SHIFT */
.active{
  filter:hue-rotate(140deg) contrast(1.2);
}

/* subtle shake when activated */
.shake{
  animation:shake 0.4s infinite;
}

@keyframes shake{
  0%{transform:translate(0,0);}
  25%{transform:translate(1px,-1px);}
  50%{transform:translate(-1px,1px);}
  75%{transform:translate(1px,1px);}
  100%{transform:translate(0,0);}
}

</style>
</head>

<body>

<div class="wrap" id="wrap">

  <h1>SAFU</h1>

  <div class="sub">So Absolutely F#cked Up</div>

  <div class="desc">
    A controlled collapse of logic deployed on Terra Classic.  
    Built from instability, sustained by attention.
  </div>

  <button onclick="enter()">ENTER SAFU</button>

</div>

<div class="info">
  <div>
    <div>CHAIN</div>
    <div>Terra Classic</div>
  </div>

  <div>
    <div>STATE</div>
    <div id="state">Dormant</div>
  </div>

  <div>
    <div>SIGNAL</div>
    <div id="signal">Low</div>
  </div>
</div>

<script>

let active = false;

function enter(){
  active = true;

  document.body.classList.add("active","shake");

  document.getElementById("state").innerText = "Active";
  document.getElementById("signal").innerText = "Rising";

  const signals = [
    "liquidity distortion detected",
    "community coherence unstable",
    "market emotion overheating",
    "SAFU resonance expanding",
    "unknown behavioral loop forming"
  ];

  setInterval(()=>{
    if(!active) return;

    document.getElementById("signal").innerText =
      signals[Math.floor(Math.random()*signals.length)];

  }, 1800);
}

</script>

</body>
</html>
