<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>SAFU — Signal Core</title>

<style>
:root{
  --bg:#05060a;
  --text:#eafff4;
  --accent:#00ff99;
  --muted:rgba(255,255,255,0.65);
}

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family: monospace;
}

body{
  background: radial-gradient(circle at center, #0e1018, var(--bg));
  color:var(--text);
  overflow:hidden;
}

/* subtle animated noise */
body::before{
  content:"";
  position:fixed;
  inset:0;
  background: repeating-linear-gradient(
    0deg,
    rgba(255,255,255,0.03),
    rgba(255,255,255,0.03) 1px,
    transparent 1px,
    transparent 2px
  );
  opacity:0.05;
  pointer-events:none;
}

/* CENTER CORE */
.wrap{
  height:100vh;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  text-align:center;
  padding:20px;
}

/* SIGNAL CORE VISUAL */
.core{
  position:absolute;
  width:320px;
  height:320px;
  border-radius:50%;
  background: radial-gradient(circle, rgba(0,255,153,0.25), transparent 70%);
  animation:pulse 3s infinite ease-in-out;
  filter: blur(2px);
  z-index:0;
}

@keyframes pulse{
  0%{transform:scale(0.9); opacity:0.5;}
  50%{transform:scale(1.2); opacity:1;}
  100%{transform:scale(0.9); opacity:0.5;}
}

/* TITLE */
h1{
  font-size:84px;
  letter-spacing:8px;
  color:var(--accent);
  z-index:1;
  text-shadow:0 0 30px rgba(0,255,153,0.25);
  animation:flicker 2.8s infinite;
}

@keyframes flicker{
  0%,100%{opacity:1;}
  50%{opacity:0.7;}
}

/* SUBTEXT */
.sub{
  margin-top:10px;
  font-size:14px;
  color:var(--muted);
  z-index:1;
}

.desc{
  margin-top:10px;
  max-width:480px;
  font-size:13px;
  color:var(--muted);
  line-height:1.5;
  z-index:1;
}

/* CTA */
button{
  margin-top:25px;
  padding:12px 18px;
  border:1px solid var(--accent);
  background:transparent;
  color:var(--accent);
  cursor:pointer;
  transition:0.2s;
  z-index:1;
}

button:hover{
  background:var(--accent);
  color:black;
}

/* INFO BLOCK (bottom) */
.info{
  position:absolute;
  bottom:30px;
  width:100%;
  display:flex;
  justify-content:center;
  gap:40px;
  font-size:12px;
  color:var(--muted);
}

.info div{
  text-align:center;
}

/* STATE CHANGE */
.active{
  filter:hue-rotate(120deg) contrast(1.1);
}
</style>
</head>

<body>

<div class="wrap" id="wrap">

  <div class="core"></div>

  <h1>SAFU</h1>

  <div class="sub">So Absolutely F#cked Up</div>

  <div class="desc">
    Terra Classic anomaly signal detected.  
    A controlled experiment in chaotic market behavior.
  </div>

  <button onclick="enter()">ENTER SAFU</button>

</div>

<div class="info">
  <div>
    <div>CHAIN</div>
    <div>Terra Classic</div>
  </div>

  <div>
    <div>STATUS</div>
    <div id="status">Unstable</div>
  </div>

  <div>
    <div>SIGNAL</div>
    <div id="signal">Dormant</div>
  </div>
</div>

<script>

let active = false;

function enter(){
  active = true;
  document.body.classList.toggle("active");

  document.getElementById("status").innerText = "Active";
  document.getElementById("signal").innerText = "Awakened";

  const msgs = [
    "liquidity signal shifting",
    "community resonance detected",
    "market instability rising",
    "unknown force engaged",
    "SAFU protocol stabilized... temporarily"
  ];

  setInterval(()=>{
    if(!active) return;
    document.getElementById("signal").innerText =
      msgs[Math.floor(Math.random()*msgs.length)];
  }, 2000);
}

</script>

</body>
</html>
