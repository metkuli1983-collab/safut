<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>$SAFU // SYSTEM UNSTABLE</title>

<style>
  body {
    margin:0;
    font-family: monospace;
    background:#050507;
    color:#dfffe9;
    overflow:hidden;
  }

  canvas {
    position:fixed;
    top:0;
    left:0;
    z-index:-1;
  }

  header {
    text-align:center;
    padding:60px 20px 20px;
  }

  h1 {
    font-size:64px;
    color:#00ff99;
    letter-spacing:3px;
    animation:glitch 1.5s infinite;
    cursor:pointer;
  }

  @keyframes glitch {
    0% { transform: translate(0); }
    20% { transform: translate(-2px,2px); }
    40% { transform: translate(2px,-2px); }
    60% { transform: translate(-1px,1px); }
    80% { transform: translate(1px,-1px); }
    100% { transform: translate(0); }
  }

  .status {
    margin-top:10px;
    opacity:0.7;
  }

  .panel {
    max-width:900px;
    margin:40px auto;
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(240px,1fr));
    gap:15px;
    padding:20px;
  }

  .card {
    border:1px solid #1affaa33;
    padding:15px;
    background:rgba(255,255,255,0.03);
    transition:0.2s;
    cursor:pointer;
  }

  .card:hover {
    transform:scale(1.03) rotate(-1deg);
    border-color:#00ff99;
  }

  .log {
    position:fixed;
    bottom:10px;
    left:10px;
    font-size:12px;
    opacity:0.6;
  }

  .hidden {
    display:none;
    text-align:center;
    margin-top:40px;
    color:#ffcc00;
  }

</style>
</head>

<body>

<canvas id="bg"></canvas>

<header>
  <h1 onclick="glitchBurst()">$SAFU</h1>
  <div class="status" id="status">SYSTEM STATUS: unstable but vibing</div>
</header>

<div class="panel">
  <div class="card" onclick="randomEvent()">LIQUIDITY</div>
  <div class="card" onclick="randomEvent()">COMMUNITY</div>
  <div class="card" onclick="randomEvent()">ROADMAP</div>
  <div class="card" onclick="randomEvent()">SAFETY</div>
  <div class="card" onclick="randomEvent()">REALITY CHECK</div>
  <div class="card" onclick="easterEgg()">???</div>
</div>

<div class="hidden" id="secret">
  🐤 CYBERDUCK PROTOCOL ACTIVATED 🐤<br>
  welcome to the deeper layer of SAFU
</div>

<div class="log" id="log">init...</div>

<script>
const log = document.getElementById("log");
const status = document.getElementById("status");
const secret = document.getElementById("secret");

const messages = [
  "liquidity looks at you funny",
  "community is arguing with itself",
  "roadmap was eaten by a duck",
  "this is technically fine",
  "nothing is fine",
  "Terra Classic energy unstable",
  "SAFU detected SAFU failure",
  "someone clicked something they shouldn't"
];

function randomEvent(){
  const msg = messages[Math.floor(Math.random()*messages.length)];
  status.innerText = "SYSTEM: " + msg;
  log.innerText = "event: " + msg;
  flash();
}

function glitchBurst(){
  document.body.style.filter = "hue-rotate(180deg)";
  setTimeout(()=>document.body.style.filter="none",300);
  randomEvent();
}

function easterEgg(){
  secret.style.display = "block";
  document.body.style.background = "#000";
  status.innerText = "SYSTEM: CYBERDUCK AWAKENED";
}

function flash(){
  document.body.style.background = "#0a0a0f";
  setTimeout(()=>document.body.style.background="#050507",150);
}

// floating particles
const canvas = document.getElementById("bg");
const ctx = canvas.getContext("2d");
canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let dots = Array.from({length:80},()=>({
  x:Math.random()*canvas.width,
  y:Math.random()*canvas.height,
  r:Math.random()*2,
  dx:(Math.random()-0.5)*1,
  dy:(Math.random()-0.5)*1
}));

function draw(){
  ctx.clearRect(0,0,canvas.width,canvas.height);
  ctx.fillStyle="#00ff9940";

  dots.forEach(d=>{
    d.x+=d.dx;
    d.y+=d.dy;

    if(d.x<0||d.x>canvas.width) d.dx*=-1;
    if(d.y<0||d.y>canvas.height) d.dy*=-1;

    ctx.beginPath();
    ctx.arc(d.x,d.y,d.r,0,Math.PI*2);
    ctx.fill();
  });

  requestAnimationFrame(draw);
}

draw();
</script>

</body>
</html>
